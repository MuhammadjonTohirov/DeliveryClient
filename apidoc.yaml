                $ref: '#/components/schemas/PaginatedDriverTaskList'
          description: ''
  /api/drivers/tasks/{id}/:
    get:
      operationId: api_drivers_tasks_retrieve
      description: Get details of a specific task
      summary: Get task details
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
