openapi: 3.0.3
info:
  title: Delivery Platform API
  version: 1.0.0
  description: API documentation for Delivery Platform
paths:
  /api/drivers/availability/:
    get:
      operationId: api_drivers_availability_list
      description: ViewSet for managing driver availability.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDriverAvailabilityList'
          description: ''
  /api/drivers/availability/{id}/:
    get:
      operationId: api_drivers_availability_retrieve
      description: Get availability status of a driver
      summary: Get driver availability
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverAvailability'
          description: ''
    put:
      operationId: api_drivers_availability_update
      description: Update driver availability status
      summary: Update availability
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverAvailabilityRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DriverAvailabilityRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DriverAvailabilityRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverAvailability'
          description: ''
    patch:
      operationId: api_drivers_availability_partial_update
      description: Partially update driver availability
      summary: Partial update availability
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDriverAvailabilityRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDriverAvailabilityRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDriverAvailabilityRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverAvailability'
          description: ''
  /api/drivers/availability/me/:
    get:
      operationId: api_drivers_availability_me_retrieve
      description: Get current driver's availability status
      summary: Get my availability
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverAvailability'
          description: ''
  /api/drivers/earnings/:
    get:
      operationId: api_drivers_earnings_list
      description: List all earnings for a driver
      summary: List earnings
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDriverEarningList'
          description: ''
  /api/drivers/earnings/{id}/:
    get:
      operationId: api_drivers_earnings_retrieve
      description: Get details of a specific earning
      summary: Get earning details
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverEarning'
          description: ''
  /api/drivers/earnings/summary/:
    get:
      operationId: api_drivers_earnings_summary_retrieve
      description: Get a summary of driver earnings for a specified period
      summary: Get earnings summary
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverEarning'
          description: ''
  /api/drivers/locations/:
    get:
      operationId: api_drivers_locations_list
      description: List of driver location updates
      summary: List driver locations
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDriverLocationList'
          description: ''
    post:
      operationId: api_drivers_locations_create
      description: Create a new location update (Driver only)
      summary: Create location update
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverLocationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DriverLocationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DriverLocationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverLocation'
          description: ''
  /api/drivers/locations/{id}/:
    get:
      operationId: api_drivers_locations_retrieve
      description: Get details of a specific location update
      summary: Get location details
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverLocation'
          description: ''
  /api/drivers/locations/latest/:
    get:
      operationId: api_drivers_locations_latest_retrieve
      description: Get the latest location for the current driver or a specific driver
      summary: Get latest location
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverLocation'
          description: ''
  /api/drivers/tasks/:
    get:
      operationId: api_drivers_tasks_list
      description: List all tasks for a driver
      summary: List driver tasks
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
