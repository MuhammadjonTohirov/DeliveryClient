      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuCategory'
          description: ''
    put:
      operationId: api_restaurants_categories_update
      description: Update a menu category (Restaurant owner only)
      summary: Update menu category
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this menu category.
        required: true
      tags:
