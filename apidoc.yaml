          description: ''
  /api/orders/{id}/preparing/:
    post:
      operationId: api_orders_preparing_create
      description: Restaurant owner can mark an order as being prepared
      summary: Mark order as preparing
      parameters:
      - in: path
        name: id
        schema:
          type: string
