name: delivery_client
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8 # For iOS style icons
  provider: ^6.1.2 # State management
  http: ^1.2.1 # Network requests
  shared_preferences: ^2.2.3 # Local storage
  intl: ^0.19.0 # Internationalization and formatting
  google_fonts: ^6.2.1 # Custom fonts
  flutter_svg: ^2.0.10+1 # SVG support
  cached_network_image: ^3.3.1 # Efficient image loading
  image_picker: ^1.1.2 # For picking images
  permission_handler: ^11.3.1 # For handling permissions
  firebase_core: ^3.13.1 # Firebase core
  firebase_auth: ^5.5.4 # Firebase authentication
  # google_sign_in: ^6.2.1 # For Google Sign In (works with firebase_auth)
  # sign_in_with_apple: ^6.1.1 # For Sign in with Apple
  google_maps_flutter: ^2.7.0 # For Google Maps
  flutter_rating_bar: ^4.0.1 # For star ratings
  smooth_page_indicator: ^1.1.0 # For onboarding carousels
  country_picker: ^2.0.26 # For country code picker

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0 # Consider updating to latest, e.g. ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/ # Directory for image assets
    - assets/icons/ # Directory for icon assets
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware
  #
  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages
  #
  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages
